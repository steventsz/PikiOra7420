{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PikiOra Clinic</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<nav class="site-header">
    <div class="container nav-bar">
        <a class="site-title" href="{% url 'clinic:doctor_list' %}">PikiOra Clinic</a>
        <div class="nav-links">
            <a class="nav-link" href="{% url 'clinic:doctor_list' %}">Doctors</a>
            {% if user.is_authenticated %}
                <a class="nav-link" href="{% url 'clinic:my_appointments' %}">My Appointments</a>
                <form method="post" action="{% url 'logout' %}" class="inline-form">
                    {% csrf_token %}
                    <button type="submit" class="nav-button">Logout</button>
                </form>
            {% else %}
                <a class="nav-link" href="{% url 'login' %}">Login</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container page-content">
    {% if messages %}
        {% for message in messages %}
            <div class="message {% if message.tags == 'error' %}message-error{% else %}message-{{ message.tags|default:'info' }}{% endif %}" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>
</body>
</html>
