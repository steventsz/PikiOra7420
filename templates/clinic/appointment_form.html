{% extends "base.html" %}

{% block content %}
<div class="form-page">
    <div class="card form-card">
        <h1>{{ form_title }}</h1>

        <div class="detail-panel">
            <p><strong>Doctor:</strong> {{ slot.doctor.name }}</p>
            <p><strong>Date:</strong> {{ slot.date }}</p>
            <p><strong>Time:</strong> {{ slot.get_slot_index_display }}</p>
        </div>

        <form method="post" class="simple-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{{ submit_label }}</button>
                <a href="{{ back_url }}" class="btn btn-outline">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
