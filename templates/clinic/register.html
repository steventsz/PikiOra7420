{% extends "base.html" %}

{% block content %}
<div class="form-page">
    <div class="card form-card">
        <h1>Patient Registration</h1>
        <p class="muted-text">For coursework demonstration, you can use a simple username and password.</p>
        <form method="post" class="simple-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create Account</button>
                <a href="{% url 'clinic:login' %}" class="btn btn-outline">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
