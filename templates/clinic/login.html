{% extends "base.html" %}

{% block content %}
<div class="form-page">
    <div class="card form-card form-card-small">
        <h1>Login</h1>
        <form method="post" class="simple-form">
            {% csrf_token %}
            {{ form.as_p }}
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p class="muted-text">No account yet? <a href="{% url 'clinic:register' %}">Register here</a>.</p>
    </div>
</div>
{% endblock %}
